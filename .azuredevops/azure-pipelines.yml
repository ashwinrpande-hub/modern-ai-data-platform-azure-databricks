trigger: { branches: { include: [main] }, paths: { include: [config/*, pipelines/*, ingestion/*, dq/*, security/*] } }
stages:
- stage: Validate
  jobs:
  - job: lint_and_unit
    pool: { vmImage: ubuntu-latest }
    steps:
    - script: pip install -r requirements.txt ruff && ruff check . && python -c "import yaml; yaml.safe_load(open('config/replication_sources.yaml'))"
      displayName: Lint + YAML schema check
- stage: DeployDev
  dependsOn: Validate
  jobs:
  - deployment: dev
    environment: databricks-dev
    strategy: { runOnce: { deploy: { steps: [
      { script: "python scripts/deploy.py --env dev", env: { DATABRICKS_HOST: $(DBX_HOST_DEV), DATABRICKS_TOKEN: $(DBX_TOKEN_DEV), DATABRICKS_WAREHOUSE_ID: $(DBX_WH_DEV) } },
      { script: "python scripts/validate.py", env: { DATABRICKS_HOST: $(DBX_HOST_DEV), DATABRICKS_TOKEN: $(DBX_TOKEN_DEV), DATABRICKS_WAREHOUSE_ID: $(DBX_WH_DEV) } } ] } } }
- stage: DeployProd
  dependsOn: DeployDev
  jobs:
  - deployment: prod
    environment: databricks-prod        # approval gate configured in ADO environment
    strategy: { runOnce: { deploy: { steps: [
      { script: "python scripts/deploy.py --env prod && python scripts/validate.py", env: { DATABRICKS_HOST: $(DBX_HOST_PRD), DATABRICKS_TOKEN: $(DBX_TOKEN_PRD), DATABRICKS_WAREHOUSE_ID: $(DBX_WH_PRD) } } ] } } }
